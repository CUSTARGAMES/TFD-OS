name: Build TFD OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y nasm gcc-multilib grub-pc-bin xorriso mtools

      - name: Assemble bootloader
        run: nasm -f elf32 boot.s -o boot.o

      - name: Compile kernel
        run: gcc -m32 -ffreestanding -nostdlib -nostdinc -fno-builtin -fno-stack-protector -O2 -c kernel.c -o kernel.o

      - name: Link kernel
        run: ld -m elf_i386 -T linker.ld -o kernel.bin boot.o kernel.o

      - name: Debug – show file sizes
        run: |
          echo "=== File sizes ==="
          ls -la boot.o kernel.o kernel.bin
          echo "=== kernel.bin type ==="
          file kernel.bin
          echo "=== First 32 bytes of kernel.bin (hex) ==="
          hexdump -C kernel.bin | head -4 || echo "kernel.bin is empty or not found"

      - name: Prepare ISO directory
        run: |
          mkdir -p iso/boot/grub
          cp kernel.bin iso/boot/kernel.bin
          cp grub.cfg iso/boot/grub/grub.cfg

      - name: Build ISO
        run: grub-mkrescue -o tfd-os.iso iso/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: tfd-os
          path: tfd-os.iso
